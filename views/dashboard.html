<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Software Efficiency Analyzer</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar glass-panel">
            <h2><i class="fas fa-leaf"></i> Google Map Algorithm Analyzer</h2>
            
            <div class="form-group">
                <label for="moduleSelect">Feature Module</label>
                <select id="moduleSelect">
                    <option value="routeFinding">Route Finding</option>
                    <option value="searching">Place Search</option>
                    <option value="nearby">Nearby Places</option>
                    <option value="gps">GPS Tracking</option>
                    <option value="traffic">Traffic Prediction</option>
                    <option value="optimization">Route Optimization</option>
                </select>
            </div>

            <div class="form-group">
                <label for="algorithmSelect">Algorithm</label>
                <select id="algorithmSelect"></select>
            </div>

            <div class="form-group">
                <label for="sizeSelect">Input Size</label>
                <select id="sizeSelect">
                    <option value="Small">Small</option>
                    <option value="Medium">Medium</option>
                    <option value="Large">Large</option>
                </select>
            </div>

            <button id="benchmarkBtn" class="btn"><i class="fas fa-play"></i> Run Benchmark</button>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
    <button id="exportCsvBtn" class="btn" style="flex: 1; font-size: 12px; background: #28a745; color: white;"><i class="fas fa-file-csv"></i> CSV</button>
    <button id="exportPdfBtn" class="btn" style="flex: 1; font-size: 12px; background: #dc3545; color: white;"><i class="fas fa-file-pdf"></i> PDF</button>
</div>
            <div class="green-recommendation glass-panel" id="recommendationPanel">
                <h3>Green Recommendation</h3>
                <p id="recText">Run a benchmark to get recommendations.</p>
            </div>
        </aside>

        <main class="main-content">
            <div class="summary-cards">
                <div class="card glass-panel">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h4>Execution Time</h4>
                        <span id="timeResult">0 ms</span>
                    </div>
                </div>
                <div class="card glass-panel">
                    <i class="fas fa-memory"></i>
                    <div>
                        <h4>Memory Usage</h4>
                        <span id="memoryResult">0 MB</span>
                    </div>
                </div>
                <div class="card glass-panel">
                    <i class="fas fa-microchip"></i>
                    <div>
                        <h4>CPU Usage</h4>
                        <span id="cpuResult">0 ms</span>
                    </div>
                </div>
                <div class="card glass-panel">
                    <i class="fas fa-bolt"></i>
                    <div>
                        <h4>Energy</h4>
                        <span id="energyResult">0 Joules</span>
                    </div>
                </div>
                <div class="card glass-panel highlight">
                    <i class="fas fa-star"></i>
                    <div>
                        <h4>Green Score</h4>
                        <span id="scoreResult">-</span>
                    </div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-container glass-panel">
                    <canvas id="barChart"></canvas>
                </div>
                <div class="chart-container glass-panel">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
